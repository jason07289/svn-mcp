services:
  svn-mcp:
    image: svn-mcp:latest
    build:
      context: .
      # Default: host-built JAR (no Gradle download inside Docker — avoids disk issues).
      # All-in-Docker build: SVN_MCP_DOCKERFILE=docker/Dockerfile docker compose build
      dockerfile: ${SVN_MCP_DOCKERFILE:-docker/Dockerfile.packaged}
    ports:
      - "8765:8765"
    environment:
      SERVER_PORT: "8765"
      SVN_DEMO_USER: ${SVN_DEMO_USER:-admin}
      SVN_DEMO_PASSWORD: ${SVN_DEMO_PASSWORD:-Password123!}
