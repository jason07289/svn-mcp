server:
  port: 8765

spring:
  application:
    name: cicd-mcp

io:
  github:
    jason07289:
      cicd:
        mcp:
          repositories:
            - id: test-repo
              name: test-repo
              root_url: svn://host.docker.internal:3690/test-repo
              group: default
              credentials:
                username: ${SVN_DEMO_USER:admin}
                password: ${SVN_DEMO_PASSWORD:Password123!}
            - id: my-test
              name: my-test
              root_url: svn://host.docker.internal:3690/my-test
              group: default
              credentials:
                username: ${SVN_DEMO_USER:admin}
                password: ${SVN_DEMO_PASSWORD:Password123!}
            - id: websvn
              name: websvn
              root_url: svn://host.docker.internal:3690/websvn
              group: default
              credentials:
                username: ${SVN_DEMO_USER:admin}
                password: ${SVN_DEMO_PASSWORD:Password123!}
          authz_file: ""
          defaults:
            log_limit_max: 500
            file_content_max_bytes: 2000000
            max_revisions_for_stats: 500
            diff_max_total_lines: 3500
            diff_max_lines_per_file: 1000
            diff_max_files_per_response: 15
            diff_max_chars_per_line: 800
            diff_max_response_bytes: 300000
            diff_spill_directory: ""
