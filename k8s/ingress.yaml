# Headlamp: Ingress 컨트롤러가 있는 클러스터에서만 사용. host / ingressClassName 수정.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: svn-mcp
  namespace: mcp
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  labels:
    app.kubernetes.io/name: svn-mcp
spec:
  ingressClassName: nginx
  rules:
    - host: svn-mcp.example.com
      http:
        paths:
          - path: /svn-mcp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: svn-mcp
                port:
                  number: 80
