# ConfigMap(svn-mcp-config), Secret(svn-mcp-secret)을 먼저 적용한 뒤 배포.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svn-mcp
  namespace: mcp
  labels:
    app.kubernetes.io/name: svn-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: svn-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: svn-mcp
    spec:
      containers:
        - name: svn-mcp
          image: svn-mcp:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
          envFrom:
            - configMapRef:
                name: svn-mcp-config
            - secretRef:
                name: svn-mcp-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            tcpSocket:
              port: 8765
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8765
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8765
            periodSeconds: 30
